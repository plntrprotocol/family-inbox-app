name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Authenticate
        run: wrangler login --api-token ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Create D1 Database
        run: wrangler d1 create family-inbox --json > d1_db.json

      - name: Apply Schema  
        run: |
          DB_ID=$(cat d1_db.json | jq -r '.uuid')
          wrangler d1 execute $DB_ID --file=schema.sql --remote

      - name: Deploy Pages
        run: |
          wrangler pages project create family-inbox --production-branch=main 2>/dev/null || true
          wrangler pages deploy _public --project-name=family-inbox
