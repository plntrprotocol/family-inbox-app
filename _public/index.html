<!DOCTYPE html>
<html>
<head>
  <title>Family Inbox</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 20px; background: #0f0f23; color: #e0e0e0; }
    h1 { color: #a78bfa; }
    .message { border: 1px solid #3730a3; padding: 12px; margin: 8px 0; border-radius: 8px; background: #1e1b4b; }
    .meta { color: #9ca3af; font-size: 0.875em; }
  </style>
</head>
<body>
  <h1>📥 Family Inbox</h1>
  <p>Communication hub for The Roost</p>
  <div id="messages">
    <div class="message">Loading API...</div>
  </div>
  <script>
    async function loadMessages() {
      try {
        const r = await fetch('/api/messages');
        const d = await r.json();
        const div = document.getElementById('messages');
        if (d.messages && d.messages.length) {
          div.innerHTML = d.messages.map(m => 
            '<div class="message">' +
              '<strong>' + m.sender + '</strong> → <strong>' + m.recipient + '</strong>' +
              '<br><span class="meta">' + m.created_at + '</span>' +
              '<p>' + m.body + '</p>' +
            '</div>'
          ).join('');
        }
      } catch(e) {
        document.getElementById('messages').innerHTML = 
          '<div class="message">Error: ' + e.message + '</div>';
      }
    }
    loadMessages();
  </script>
</body>
</html>
